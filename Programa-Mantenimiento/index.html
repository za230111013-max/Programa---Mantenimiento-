<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CMMS Enterprise — Sistema de Gestión de Mantenimiento Computarizado para manufactura automotriz. Gestión de activos, órdenes de trabajo, mantenimiento preventivo, inventario y análisis AMEF.">
  <meta name="keywords" content="CMMS, mantenimiento, TPM, RCM, AMEF, manufactura, gestión de activos, ISO 55000">
  <meta name="author" content="CMMS Enterprise">
  <title>CMMS Enterprise — Gestión de Mantenimiento Industrial</title>

  <!-- Design System CSS -->
  <link rel="stylesheet" href="css/design-system.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Favicon inline (gear icon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN
       ═══════════════════════════════════════════ -->
  <div id="loading-screen" style="
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0e1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; transition: opacity 0.5s ease;
  ">
    <div style="
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 16px; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(59,130,246,0.4);
      animation: pulse 2s ease-in-out infinite;
    ">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </div>
    <div style="color: #f1f5f9; font-family: 'Inter', sans-serif; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em;">
      CMMS Enterprise
    </div>
    <div style="color: #64748b; font-family: 'Inter', sans-serif; font-size: 0.8125rem;">
      Iniciando sistema de mantenimiento...
    </div>
    <div style="
      width: 200px; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden; margin-top: 8px;
    ">
      <div id="loading-bar" style="
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        border-radius: 3px;
        transition: width 0.3s ease;
      "></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       APP LAYOUT
       ═══════════════════════════════════════════ -->
  <div class="app-layout" id="app-layout" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">CMMS Enterprise</span>
          <span class="sidebar-brand-sub">Gestión de Mantenimiento</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <!-- Principal -->
        <div class="nav-section">
          <div class="nav-section-title">Principal</div>
          <div class="nav-item active" data-route="/dashboard" onclick="Router.navigate('/dashboard')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            </span>
            <span class="nav-item-label">Dashboard</span>
          </div>
        </div>

        <!-- Gestión -->
        <div class="nav-section">
          <div class="nav-section-title">Gestión</div>
          <div class="nav-item" data-route="/assets" onclick="Router.navigate('/assets')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/></svg>
            </span>
            <span class="nav-item-label">Activos</span>
            <span class="nav-item-badge" id="badge-assets">52</span>
          </div>
          <div class="nav-item" data-route="/workorders" onclick="Router.navigate('/workorders')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 12H8"/><path d="M16 17H8"/><path d="M16 12h-2"/></svg>
            </span>
            <span class="nav-item-label">Órdenes de Trabajo</span>
            <span class="nav-item-badge" id="badge-workorders" style="background:var(--warning)">0</span>
          </div>
          <div class="nav-item" data-route="/preventive" onclick="Router.navigate('/preventive')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
            </span>
            <span class="nav-item-label">Mtto. Preventivo</span>
          </div>
        </div>

        <!-- Soporte -->
        <div class="nav-section">
          <div class="nav-section-title">Soporte</div>
          <div class="nav-item" data-route="/inventory" onclick="Router.navigate('/inventory')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            </span>
            <span class="nav-item-label">Inventario</span>
          </div>
          <div class="nav-item" data-route="/amef" onclick="Router.navigate('/amef')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </span>
            <span class="nav-item-label">AMEF / RCM</span>
          </div>
        </div>

        <!-- Análisis -->
        <div class="nav-section">
          <div class="nav-section-title">Análisis</div>
          <div class="nav-item" data-route="/reports" onclick="Router.navigate('/reports')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            </span>
            <span class="nav-item-label">Reportes</span>
          </div>
          <div class="nav-item" data-route="/admin" onclick="Router.navigate('/admin')">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
            </span>
            <span class="nav-item-label">Administración</span>
          </div>
        </div>
      </nav>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <div class="nav-item" onclick="App.toggleTheme()" style="margin-bottom:0">
          <span class="nav-item-icon" id="theme-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
          <span class="nav-item-label" id="theme-label">Modo Claro</span>
        </div>
      </div>
    </aside>

    <!-- HEADER -->
    <header class="header" id="header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="App.toggleSidebar()" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-current">Dashboard</span>
        </div>
        <div class="header-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" placeholder="Buscar equipos, OTs, repuestos..." id="global-search" autocomplete="off">
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" id="btn-notifications" title="Notificaciones" onclick="App.showNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notification-dot" id="notification-dot"></span>
        </button>
        <button class="header-btn" title="Exportar datos" onclick="App.exportData()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <div class="header-user" id="header-user">
          <div class="header-avatar">CM</div>
          <div class="header-user-info">
            <span class="header-user-name">Carlos Mendoza</span>
            <span class="header-user-role">Gerente de Mantenimiento</span>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">
      <!-- Contenido dinámico renderizado por el Router -->
    </main>
  </div>

  <!-- ═══════════════════════════════════════════
       SCRIPTS (orden importa)
       ═══════════════════════════════════════════ -->
  <!-- Core -->
  <script src="js/core/database.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/components.js"></script>

  <!-- Data -->
  <script src="js/data/seed-data.js"></script>

  <!-- Modules -->
  <script src="js/modules/dashboard/dashboard.js"></script>
  <script src="js/modules/assets/assets.js"></script>
  <script src="js/modules/workorders/workorders.js"></script>
  <script src="js/modules/preventive/preventive.js"></script>
  <script src="js/modules/inventory/inventory.js"></script>
  <script src="js/modules/amef/amef.js"></script>
  <script src="js/modules/reports/reports.js"></script>
  <script src="js/modules/admin/admin.js"></script>

  <!-- App Bootstrap -->
  <script src="js/app.js"></script>

</body>
</html>
